<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet Benny!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f4f8; }
  .app { max-width: 580px; width: 100%; padding: 10px; user-select: none; }
  h1 { font-size: 32px; text-align: center; color: #333; margin-bottom: 2px; }
  h1 span { transition: color 0.3s; }
  .subtitle { text-align: center; font-size: 15px; color: #777; margin-bottom: 10px; }
  .stage { border-radius: 16px; overflow: hidden; position: relative; height: 340px; transition: background 0.5s; margin-bottom: 12px; }
  .controls { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; }
  .ctrl-btn { padding: 10px 16px; border-radius: 22px; border: 2px solid #ddd; background: white; font-weight: 600; font-size: 15px; cursor: pointer; color: #555; transition: all 0.15s; }
  .ctrl-btn.active { border-color: #4488FF; background: #EEF4FF; color: #4488FF; }
  .ctrl-btn.dancing { border-color: #FF4444; background: #FFF0F0; color: #FF4444; }
  .options { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; padding: 12px; background: #f8f8f8; border-radius: 12px; }
  .opt-btn { padding: 10px 18px; border-radius: 14px; border: 2px solid #e0e0e0; background: white; color: #333; font-weight: 600; font-size: 16px; cursor: pointer; transition: all 0.15s; }
  .opt-btn.active { border-color: #4488FF; background: #4488FF; color: white; }
  .color-dot { width: 14px; height: 14px; border-radius: 7px; display: inline-block; border: 1px solid rgba(0,0,0,0.1); vertical-align: middle; margin-right: 5px; }
</style>
</head>
<body>
<div class="app">
  <h1>Meet <span id="title-name">Benny!</span> 🐶</h1>
  <p class="subtitle">Tell me what to change!</p>
  <div class="stage" id="stage"></div>
  <div class="controls" id="controls"></div>
  <div class="options" id="options" style="display:none;"></div>
</div>

<script>
const COLORS = [
  {name:"Red",value:"#FF4444"},{name:"Blue",value:"#4488FF"},{name:"Green",value:"#44CC44"},
  {name:"Yellow",value:"#FFD700"},{name:"Purple",value:"#AA44FF"},{name:"Orange",value:"#FF8800"},
  {name:"Pink",value:"#FF69B4"},{name:"Golden",value:"#DAA520"},{name:"Silver",value:"#A8A9AD"}
];
const BACKGROUNDS = [
  {name:"🌈 Park",bg:"linear-gradient(180deg,#87CEEB 0%,#90EE90 100%)",extras:"park"},
  {name:"🚀 Space",bg:"linear-gradient(180deg,#0a0a2e 0%,#1a1a4e 100%)",extras:"space"},
  {name:"🐠 Underwater",bg:"linear-gradient(180deg,#006994 0%,#003d5c 100%)",extras:"water"},
  {name:"🏜️ Desert",bg:"linear-gradient(180deg,#FF8C00 0%,#F4A460 100%)",extras:"desert"},
  {name:"❄️ Snow",bg:"linear-gradient(180deg,#b0c4de 0%,#e8e8f0 100%)",extras:"snow"}
];
const HATS = [
  {name:"No Hat",value:"none"},{name:"🎩 Top Hat",value:"tophat"},{name:"👑 Crown",value:"crown"},
  {name:"🎄 Party Hat",value:"party"},{name:"🧢 Cap",value:"cap"},{name:"🤠 Cowboy",value:"cowboy"}
];
const SIZES = [
  {name:"Tiny",value:0.5},{name:"Small",value:0.75},{name:"Normal",value:1},
  {name:"Big",value:1.3},{name:"GIANT",value:1.7}
];
const FACES = [
  {name:"😊 Happy",eyes:"happy",mouth:"smile"},{name:"😮 Surprised",eyes:"wide",mouth:"o"},
  {name:"😎 Cool",eyes:"cool",mouth:"smirk"},{name:"🤪 Silly",eyes:"silly",mouth:"tongue"},
  {name:"😴 Sleepy",eyes:"sleepy",mouth:"sleep"}
];

let state = { color: COLORS[1], bg: BACKGROUNDS[0], hat: HATS[0], size: SIZES[2], face: FACES[0], dancing: false, activePanel: null };
let danceInterval = null, dancePos = 0, danceRot = 0, danceAudio = null;

// Audio
let audioCtx = null;
function getCtx() { if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

function playSound(type) {
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if(type==="pop"){osc.type="sine";osc.frequency.setValueAtTime(600,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(1200,ctx.currentTime+0.1);gain.gain.setValueAtTime(0.3,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.15);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.15);}
    else if(type==="boing"){osc.type="sine";osc.frequency.setValueAtTime(300,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(800,ctx.currentTime+0.05);osc.frequency.exponentialRampToValueAtTime(200,ctx.currentTime+0.2);gain.gain.setValueAtTime(0.3,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.25);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.25);}
    else if(type==="whoosh"){osc.type="sawtooth";osc.frequency.setValueAtTime(200,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(800,ctx.currentTime+0.15);osc.frequency.exponentialRampToValueAtTime(100,ctx.currentTime+0.3);gain.gain.setValueAtTime(0.15,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.3);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.3);}
    else if(type==="sparkle"){[0,0.07,0.14].forEach((d,i)=>{const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type="sine";o.frequency.setValueAtTime(800+i*400,ctx.currentTime+d);g.gain.setValueAtTime(0.2,ctx.currentTime+d);g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+d+0.1);o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+0.1);});return;}
    else if(type==="stopdance"){osc.type="square";osc.frequency.setValueAtTime(600,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(150,ctx.currentTime+0.3);gain.gain.setValueAtTime(0.15,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.35);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.35);}
  } catch(e){}
}

function startDanceMusic() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const notes=[400,500,600,500,400,600,800,600,400,500,600,800,600,500,400,300];
    let idx=0;
    const gain=ctx.createGain(); gain.gain.setValueAtTime(0.05,ctx.currentTime); gain.connect(ctx.destination);
    function playNote(){
      if(danceAudio?.stopped){ctx.close();return;}
      const o=ctx.createOscillator();o.type="square";o.frequency.setValueAtTime(notes[idx%notes.length],ctx.currentTime);
      o.connect(gain);o.start(ctx.currentTime);o.stop(ctx.currentTime+0.18);idx++;
      danceAudio.timer=setTimeout(playNote,200);
    }
    danceAudio={ctx,stopped:false,timer:null}; playNote();
  } catch(e){}
}
function stopDanceMusic() {
  if(danceAudio){danceAudio.stopped=true;clearTimeout(danceAudio.timer);try{danceAudio.ctx.close();}catch(e){}danceAudio=null;}
}

// Rendering
function darkenColor(c) {
  const map={"#FF4444":"#CC2222","#4488FF":"#2266CC","#44CC44":"#22AA22","#FFD700":"#CCAA00","#AA44FF":"#8822CC","#FF8800":"#CC6600","#FF69B4":"#CC4488","#DAA520":"#B8860B","#A8A9AD":"#808185"};
  return map[c]||c;
}

function renderBgExtras(){
  const e=state.bg.extras; let h='';
  if(e==="space") for(let i=0;i<25;i++) h+=`<circle cx="${Math.random()*500}" cy="${Math.random()*340}" r="${Math.random()*2+0.5}" fill="white" opacity="${(Math.random()*0.8+0.2).toFixed(2)}"/>`;
  if(e==="water") for(let i=0;i<10;i++) h+=`<ellipse cx="${Math.random()*500}" cy="${Math.random()*340}" rx="${Math.random()*15+5}" ry="${Math.random()*6+2}" fill="rgba(255,255,255,0.1)"/>`;
  if(e==="snow") for(let i=0;i<20;i++) h+=`<circle cx="${Math.random()*500}" cy="${Math.random()*350}" r="${Math.random()*4+2}" fill="white" opacity="0.6"/>`;
  if(e==="park") h+=`<circle cx="60" cy="240" r="30" fill="#228B22" opacity="0.4"/><rect x="57" y="240" width="6" height="30" fill="#8B4513" opacity="0.4"/><circle cx="430" cy="220" r="35" fill="#228B22" opacity="0.3"/><rect x="427" y="220" width="6" height="35" fill="#8B4513" opacity="0.3"/>`;
  if(e==="desert") h+=`<circle cx="420" cy="60" r="30" fill="#FFD700" opacity="0.5"/><polygon points="80,300 110,230 140,300" fill="#C2A04E" opacity="0.3"/><polygon points="380,300 420,210 460,300" fill="#C2A04E" opacity="0.25"/>`;
  return h;
}

function renderHat(s){
  const v=state.hat.value; if(v==="none") return '';
  const y=-58*s;
  if(v==="tophat") return `<g transform="translate(0,${y})"><rect x="${-30*s}" y="${-42*s}" width="${60*s}" height="${46*s}" rx="5" fill="#222"/><rect x="${-42*s}" y="0" width="${84*s}" height="${9*s}" rx="5" fill="#222"/><rect x="${-30*s}" y="${-8*s}" width="${60*s}" height="${7*s}" fill="#8B0000"/></g>`;
  if(v==="crown") return `<g transform="translate(0,${y})"><polygon points="${-36*s},5 ${-36*s},${-28*s} ${-22*s},${-10*s} ${-10*s},${-32*s} 0,${-10*s} ${10*s},${-32*s} ${22*s},${-10*s} ${36*s},${-28*s} ${36*s},5" fill="#FFD700" stroke="#DAA520" stroke-width="2"/><circle cx="0" cy="${-10*s}" r="${4*s}" fill="#FF0000"/><circle cx="${-22*s}" cy="${-7*s}" r="${3*s}" fill="#0055FF"/><circle cx="${22*s}" cy="${-7*s}" r="${3*s}" fill="#00CC00"/></g>`;
  if(v==="party") return `<g transform="translate(0,${y})"><polygon points="0,${-46*s} ${-26*s},8 ${26*s},8" fill="#FF4444" stroke="#CC0000" stroke-width="1"/><circle cx="0" cy="${-46*s}" r="${5*s}" fill="#FFD700"/><line x1="${-13*s}" y1="${-14*s}" x2="${13*s}" y2="${-14*s}" stroke="#FFD700" stroke-width="3"/><line x1="${-17*s}" y1="${-4*s}" x2="${17*s}" y2="${-4*s}" stroke="#44FF44" stroke-width="3"/></g>`;
  if(v==="cap") return `<g transform="translate(0,${y})"><ellipse cx="0" cy="0" rx="${40*s}" ry="${13*s}" fill="#2255AA"/><rect x="${-35*s}" y="${-22*s}" width="${70*s}" height="${25*s}" rx="${18*s}" fill="#2255AA"/><ellipse cx="${32*s}" cy="0" rx="${22*s}" ry="${7*s}" fill="#1a4488"/></g>`;
  if(v==="cowboy") return `<g transform="translate(0,${y})"><ellipse cx="0" cy="5" rx="${50*s}" ry="${11*s}" fill="#8B6914"/><rect x="${-26*s}" y="${-32*s}" width="${52*s}" height="${37*s}" rx="${13*s}" fill="#A0782C"/><rect x="${-22*s}" y="${-4*s}" width="${44*s}" height="${5*s}" fill="#DAA520"/></g>`;
  return '';
}

function renderEyes(s){
  const e=state.face.eyes;
  if(e==="happy") return `<ellipse cx="${-18*s}" cy="${-12*s}" rx="${11*s}" ry="${13*s}" fill="white"/><ellipse cx="${18*s}" cy="${-12*s}" rx="${11*s}" ry="${13*s}" fill="white"/><ellipse cx="${-16*s}" cy="${-10*s}" rx="${5.5*s}" ry="${6.5*s}" fill="#222"/><ellipse cx="${20*s}" cy="${-10*s}" rx="${5.5*s}" ry="${6.5*s}" fill="#222"/><ellipse cx="${-14*s}" cy="${-14*s}" rx="${2*s}" ry="${2.5*s}" fill="white"/><ellipse cx="${22*s}" cy="${-14*s}" rx="${2*s}" ry="${2.5*s}" fill="white"/>`;
  if(e==="wide") return `<circle cx="${-18*s}" cy="${-12*s}" r="${14*s}" fill="white"/><circle cx="${18*s}" cy="${-12*s}" r="${14*s}" fill="white"/><circle cx="${-18*s}" cy="${-10*s}" r="${7*s}" fill="#222"/><circle cx="${18*s}" cy="${-10*s}" r="${7*s}" fill="#222"/>`;
  if(e==="cool") return `<rect x="${-33*s}" y="${-22*s}" width="${28*s}" height="${15*s}" rx="3" fill="#222" opacity="0.85"/><rect x="${5*s}" y="${-22*s}" width="${28*s}" height="${15*s}" rx="3" fill="#222" opacity="0.85"/><line x1="${-5*s}" y1="${-14*s}" x2="${5*s}" y2="${-14*s}" stroke="#222" stroke-width="${3*s}"/>`;
  if(e==="silly") return `<ellipse cx="${-20*s}" cy="${-14*s}" rx="${12*s}" ry="${14*s}" fill="white"/><ellipse cx="${20*s}" cy="${-14*s}" rx="${12*s}" ry="${10*s}" fill="white"/><ellipse cx="${-16*s}" cy="${-12*s}" rx="${6*s}" ry="${7*s}" fill="#222"/><ellipse cx="${24*s}" cy="${-14*s}" rx="${6*s}" ry="${5*s}" fill="#222"/>`;
  if(e==="sleepy") return `<line x1="${-28*s}" y1="${-14*s}" x2="${-8*s}" y2="${-14*s}" stroke="#222" stroke-width="${3*s}" stroke-linecap="round"/><line x1="${8*s}" y1="${-14*s}" x2="${28*s}" y2="${-14*s}" stroke="#222" stroke-width="${3*s}" stroke-linecap="round"/>`;
  return '';
}

function renderMouth(s){
  const m=state.face.mouth;
  if(m==="smile") return `<path d="M${-18*s},${18*s} Q0,${38*s} ${18*s},${18*s}" fill="none" stroke="#222" stroke-width="${3*s}" stroke-linecap="round"/>`;
  if(m==="o") return `<ellipse cx="0" cy="${22*s}" rx="${9*s}" ry="${12*s}" fill="#222"/>`;
  if(m==="smirk") return `<path d="M${-8*s},${18*s} Q${5*s},${26*s} ${20*s},${14*s}" fill="none" stroke="#222" stroke-width="${3*s}" stroke-linecap="round"/>`;
  if(m==="tongue") return `<path d="M${-18*s},${18*s} Q0,${38*s} ${18*s},${18*s}" fill="none" stroke="#222" stroke-width="${3*s}" stroke-linecap="round"/><ellipse cx="${3*s}" cy="${28*s}" rx="${7*s}" ry="${9*s}" fill="#FF6B8A"/>`;
  if(m==="sleep") return `<line x1="${-10*s}" y1="${22*s}" x2="${10*s}" y2="${22*s}" stroke="#222" stroke-width="${2.5*s}" stroke-linecap="round"/>`;
  return '';
}

function renderStage(){
  const s=state.size.value;
  const bc=state.color.value;
  const ec=darkenColor(bc);
  const stageEl=document.getElementById('stage');
  stageEl.style.background=state.bg.bg;

  stageEl.innerHTML=`<svg width="100%" height="100%" viewBox="0 0 500 340">
    ${renderBgExtras()}
    <g transform="translate(250,${230+dancePos}) rotate(${danceRot})">
      <ellipse cx="0" cy="${58*s}" rx="${35*s}" ry="${8*s}" fill="rgba(0,0,0,0.12)"/>
      <path d="M${30*s},${15*s} Q${55*s},${-20*s} ${42*s},${-35*s}" fill="none" stroke="${bc}" stroke-width="${8*s}" stroke-linecap="round"/>
      <ellipse cx="${-22*s}" cy="${48*s}" rx="${14*s}" ry="${10*s}" fill="${bc}"/>
      <ellipse cx="${22*s}" cy="${48*s}" rx="${14*s}" ry="${10*s}" fill="${bc}"/>
      <ellipse cx="${-22*s}" cy="${55*s}" rx="${10*s}" ry="${5*s}" fill="${ec}"/>
      <ellipse cx="${22*s}" cy="${55*s}" rx="${10*s}" ry="${5*s}" fill="${ec}"/>
      <ellipse cx="0" cy="${10*s}" rx="${48*s}" ry="${42*s}" fill="${bc}"/>
      <ellipse cx="0" cy="${18*s}" rx="${28*s}" ry="${24*s}" fill="rgba(255,255,255,0.35)"/>
      <circle cx="0" cy="${-30*s}" r="${32*s}" fill="${bc}"/>
      <ellipse cx="${-28*s}" cy="${-42*s}" rx="${14*s}" ry="${22*s}" fill="${ec}" transform="rotate(-20,${-28*s},${-42*s})"/>
      <ellipse cx="${28*s}" cy="${-42*s}" rx="${14*s}" ry="${22*s}" fill="${ec}" transform="rotate(20,${28*s},${-42*s})"/>
      <ellipse cx="${-28*s}" cy="${-42*s}" rx="${8*s}" ry="${14*s}" fill="#FFB6C1" opacity="0.5" transform="rotate(-20,${-28*s},${-42*s})"/>
      <ellipse cx="${28*s}" cy="${-42*s}" rx="${8*s}" ry="${14*s}" fill="#FFB6C1" opacity="0.5" transform="rotate(20,${28*s},${-42*s})"/>
      <ellipse cx="0" cy="${-18*s}" rx="${16*s}" ry="${12*s}" fill="rgba(255,255,255,0.4)"/>
      <ellipse cx="0" cy="${-22*s}" rx="${6*s}" ry="${4.5*s}" fill="#333"/>
      <ellipse cx="${-2*s}" cy="${-23.5*s}" rx="${2*s}" ry="${1.5*s}" fill="rgba(255,255,255,0.3)"/>
      <g transform="translate(0,${-30*s})">${renderEyes(s)}</g>
      <g transform="translate(0,${-28*s})">${renderMouth(s)}</g>
      <g transform="translate(0,${-30*s})">${renderHat(s)}</g>
    </g>
  </svg>`;

  document.getElementById('title-name').style.color=bc;
  document.getElementById('title-name').textContent='Benny! 🐶';
}

const panels = {
  color:{title:"🎨 Colour",items:COLORS,key:"color",sound:"pop"},
  size:{title:"📐 Size",items:SIZES,key:"size",sound:"boing"},
  bg:{title:"🌍 World",items:BACKGROUNDS,key:"bg",sound:"whoosh"},
  hat:{title:"🎩 Hat",items:HATS,key:"hat",sound:"sparkle"},
  face:{title:"😊 Face",items:FACES,key:"face",sound:"pop"}
};

function renderControls(){
  const cEl=document.getElementById('controls');
  let h='';
  for(const[k,p] of Object.entries(panels)){
    h+=`<button class="ctrl-btn ${state.activePanel===k?'active':''}" onclick="togglePanel('${k}')">${p.title}</button>`;
  }
  h+=`<button class="ctrl-btn ${state.dancing?'dancing':''}" onclick="toggleDance()">${state.dancing?'⏹ Stop':'💃 Dance!'}</button>`;
  cEl.innerHTML=h;
}

function renderOptions(){
  const oEl=document.getElementById('options');
  if(!state.activePanel){oEl.style.display='none';return;}
  oEl.style.display='flex';
  const p=panels[state.activePanel];
  let h='';
  p.items.forEach((item,i)=>{
    const isActive=item===state[p.key];
    const label=p.key==='color'?`<span class="color-dot" style="background:${item.value}"></span>${item.name}`:item.name;
    h+=`<button class="opt-btn ${isActive?'active':''}" onclick="selectOption('${state.activePanel}',${i})">${label}</button>`;
  });
  oEl.innerHTML=h;
}

function togglePanel(key){
  state.activePanel=state.activePanel===key?null:key;
  renderControls(); renderOptions();
}

function selectOption(panelKey,idx){
  const p=panels[panelKey];
  state[p.key]=p.items[idx];
  playSound(p.sound);
  renderStage(); renderOptions();
}

function toggleDance(){
  state.dancing=!state.dancing;
  if(state.dancing){
    let frame=0;
    danceInterval=setInterval(()=>{frame++;dancePos=Math.sin(frame*0.15)*18;danceRot=Math.sin(frame*0.12)*8;renderStage();},50);
    startDanceMusic();
  } else {
    clearInterval(danceInterval);dancePos=0;danceRot=0;
    stopDanceMusic(); playSound("stopdance");
    renderStage();
  }
  renderControls();
}

// Init
renderStage(); renderControls(); renderOptions();
</script>
</body>
</html>
