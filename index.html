<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0e0e0e;
    color: #fff;
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 3rem 1rem 2rem;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  header p {
    color: #888;
    margin-top: 0.5rem;
    font-size: 0.95rem;
  }

  /* ── Masonry Grid ── */
  .gallery {
    columns: 4 280px;
    column-gap: 12px;
    padding: 0 1.5rem 3rem;
    max-width: 1600px;
    margin: 0 auto;
  }

  .gallery-item {
    break-inside: avoid;
    margin-bottom: 12px;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    background: #1a1a1a;
  }

  .gallery-item img {
    width: 100%;
    display: block;
    transition: transform 0.3s ease, filter 0.3s ease;
  }

  .gallery-item:hover img {
    transform: scale(1.03);
    filter: brightness(0.8);
  }

  .gallery-item .overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 1rem;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    opacity: 0;
    transition: opacity 0.3s ease;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .gallery-item:hover .overlay { opacity: 1; }

  .overlay .filename {
    font-size: 0.8rem;
    color: #ccc;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 70%;
  }

  .overlay .download-btn {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 0.75rem;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
  }

  .overlay .download-btn:hover {
    background: rgba(255,255,255,0.3);
  }

  /* ── Lightbox ── */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(10px);
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .lightbox.active { display: flex; }

  .lightbox img {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .lightbox-controls {
    margin-top: 1.2rem;
    display: flex;
    gap: 1rem;
    align-items: center;
  }

  .lightbox-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    width: 44px; height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .lightbox-btn:hover { background: rgba(255,255,255,0.25); }

  .lightbox-download {
    background: #fff;
    color: #000;
    padding: 8px 20px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
    transition: opacity 0.2s;
  }

  .lightbox-download:hover { opacity: 0.85; }

  .lightbox-close {
    position: absolute;
    top: 1.2rem; right: 1.5rem;
  }

  .lightbox-counter {
    color: #888;
    font-size: 0.85rem;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .gallery { columns: 2; padding: 0 0.75rem 2rem; }
    header { padding: 2rem 1rem 1.5rem; }
    header h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Photo Gallery</h1>
  <p id="count"></p>
</header>

<div class="gallery" id="gallery"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-btn lightbox-close" onclick="closeLightbox()" title="Close">✕</button>
  <img id="lb-img" src="" alt="">
  <div class="lightbox-controls">
    <button class="lightbox-btn" onclick="navigate(-1)" title="Previous">←</button>
    <span class="lightbox-counter" id="lb-counter"></span>
    <button class="lightbox-btn" onclick="navigate(1)" title="Next">→</button>
    <a class="lightbox-download" id="lb-download" href="" download>Download</a>
  </div>
</div>

<script>
  // ╔══════════════════════════════════════════════════════╗
  // ║  👇 EDIT THIS: Add your image filenames here        ║
  // ║  Put all images in an "images/" folder in your repo ║
  // ╚══════════════════════════════════════════════════════╝
  const images = [
    "images/photo-001.jpg",
    "images/photo-002.jpg",
    "images/photo-003.jpg",
    "images/photo-004.jpg",
    "images/photo-005.jpg",
    "images/photo-006.jpg",
    "images/photo-007.jpg",
    "images/photo-008.jpg",
    "images/photo-009.jpg",
    "images/photo-010.jpg",
    // ... add all 100 image paths here
    // Tip: If your files are named IMG_0001.jpg etc,
    // you can generate this list with a quick script.
  ];

  // ── Build gallery ──
  const gallery = document.getElementById("gallery");
  document.getElementById("count").textContent = images.length + " photos";

  images.forEach((src, i) => {
    const name = src.split("/").pop();
    const item = document.createElement("div");
    item.className = "gallery-item";
    item.innerHTML = `
      <img src="${src}" alt="${name}" loading="lazy" onclick="openLightbox(${i})">
      <div class="overlay">
        <span class="filename">${name}</span>
        <a class="download-btn" href="${src}" download onclick="event.stopPropagation()">↓ Save</a>
      </div>
    `;
    gallery.appendChild(item);
  });

  // ── Lightbox ──
  let currentIndex = 0;
  const lightbox = document.getElementById("lightbox");
  const lbImg = document.getElementById("lb-img");
  const lbDownload = document.getElementById("lb-download");
  const lbCounter = document.getElementById("lb-counter");

  function openLightbox(i) {
    currentIndex = i;
    updateLightbox();
    lightbox.classList.add("active");
    document.body.style.overflow = "hidden";
  }

  function closeLightbox() {
    lightbox.classList.remove("active");
    document.body.style.overflow = "";
  }

  function navigate(dir) {
    currentIndex = (currentIndex + dir + images.length) % images.length;
    updateLightbox();
  }

  function updateLightbox() {
    lbImg.src = images[currentIndex];
    lbDownload.href = images[currentIndex];
    lbCounter.textContent = (currentIndex + 1) + " / " + images.length;
  }

  // Keyboard navigation
  document.addEventListener("keydown", (e) => {
    if (!lightbox.classList.contains("active")) return;
    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowLeft") navigate(-1);
    if (e.key === "ArrowRight") navigate(1);
  });

  // Click backdrop to close
  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) closeLightbox();
  });
</script>

</body>
</html>
